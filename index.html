            background-size: cover;

        .btn {

            width: 100%; padding: 18px; margin-bottom: 15px;
            border-radius: 15px; font-weight: bold; font-size: 16px;

        .btn-promo { background: #3c26ff; box-shadow: 0 4px 15px rgba(60, 38, 255, 0.4); }
        .btn-play { background: #3c26ff; animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .instr-title { font-size: 26px; font-weight: 900; text-transform: uppercase; }
        .finger-down { font-size: 50px; margin: 5px 0; animation: bounce 1.5s infinite; }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(15px); }
        }

        /* Исправил отображение инструкции */
        .instruction-image {
