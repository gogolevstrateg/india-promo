<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator 1Win - Official Promo</title>

    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            /* Фон берется из файла bg.jpg в твоем репозитории */
            background: #0b0214 url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .wrapper {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Общие настройки для всех ссылок-картинок */
        a.pixel-link {
            text-decoration: none;
            color: inherit;
            display: block;
            width: 100%;
            border: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .main-banner {
            width: 100%;
            max-width: 260px;
            border-radius: 20px;
            margin-top: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .promo-text {
            font-size: 16px;
            margin: 10px 0 20px 0;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* Стеклянная панель для кнопок */
        .glass-box {
            background: rgba(139, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 25px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            margin-bottom: 40px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 17px;
            color: white;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-promo {
            background: #3c26ff;
            box-shadow: 0 4px 20px rgba(60, 38, 255, 0.5);
        }

        .btn-play {
            background: #3c26ff;
            box-shadow: 0 4px 20px rgba(60, 38, 255, 0.5);
            animation: pulse 2s infinite;
            margin-bottom: 0;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }

        /* Секция инструкции */
        .instr-title {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .finger-down {
            font-size: 55px;
            margin: 10px 0;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(15px); }
        }

        .instruction-image {
            width: 100%;
            height: auto;
            border-radius: 20px;
            border: 3px solid #3c26ff;
            box-shadow: 0 0 30px rgba(60, 38, 255, 0.4);
            margin-bottom: 20px;
        }

        .footer-text {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <a href="https://lkhp.cc/715a0c" class="pixel-link">
            <img src="banner.png" class="main-banner" alt="Promo">
        </a>

        <p class="promo-text">⭐ Click the promo code (SEXYWIN) and receive a bonus.</p>

        <div class="glass-box">
            <a href="https://lkhp.cc/715a0c" class="btn btn-promo pixel-link">
                <span>⭐⭐ SEXYWIN ✈️✈️✈️</span>
                <span style="margin-left: auto;">🔑</span>
            </a>

            <a href="https://lkhp.cc/715a0c" class="btn btn-play pixel-link">
                <span>PLAY AND GET 550% BONUS</span>
                <span style="margin-left: auto;">🎮</span>
            </a>
        </div>

        <div class="instr-title">How to play?</div>
        <div class="finger-down">👇</div>
        
        <a href="https://lkhp.cc/715a0c" class="pixel-link">
            <img src="guide.png" class="instruction-image" alt="Step by step guide">
        </a>
        
        <p class="footer-text">
            Follow these 4 simple steps to start winning!
        </p>

    </div>

    <script>
        // Находим все ссылки с классом pixel-link и вешаем на них событие Lead
        var links = document.querySelectorAll('.pixel-link');
        links.forEach(function(link) {
            link.addEventListener('click', function() {
                // Отправка события в Facebook Pixel
                fbq('track', 'Lead');
            });
        });
    </script>

</body>
</html>
